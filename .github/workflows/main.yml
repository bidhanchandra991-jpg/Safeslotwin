name: Team11 Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # এই ম্যাজিক স্টেপটা তোর হারানো সব রং, সাইজ আর ছবি অটোমেটিক বানিয়ে দেবে
      - name: Create Missing Design Files
        run: |
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable
          echo '<?xml version="1.0" encoding="utf-8"?><resources><dimen name="dimen_1dp">1dp</dimen><dimen name="dimen_5dp">5dp</dimen><dimen name="dimen_30dp">30dp</dimen><dimen name="four">4dp</dimen></resources>' > app/src/main/res/values/dimens.xml
          sed -i 's/<\/resources>//g' app/src/main/res/values/colors.xml || true
          echo '<color name="transparent">#00000000</color><color name="dark_gray">#444444</color><color name="gray">#888888</color><color name="red">#FF0000</color></resources>' >> app/src/main/res/values/colors.xml
          echo '<?xml version="1.0" encoding="utf-8"?><shape xmlns:android="http://schemas.android.com/apk/res/android"><solid android:color="#00000000"/></shape>' > app/src/main/res/drawable/close.xml
          echo '<?xml version="1.0" encoding="utf-8"?><shape xmlns:android="http://schemas.android.com/apk/res/android"><solid android:color="#00000000"/></shape>' > app/src/main/res/drawable/ic_refresh_black_36dp.xml
          echo '<?xml version="1.0" encoding="utf-8"?><shape xmlns:android="http://schemas.android.com/apk/res/android"><solid android:color="#00000000"/></shape>' > app/src/main/res/drawable/ripple_drawable.xml

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Team11 APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload Team11 APK
        uses: actions/upload-artifact@v4
        with:
          name: Team11-App
          path: app/build/outputs/apk/debug/app-debug.apk
