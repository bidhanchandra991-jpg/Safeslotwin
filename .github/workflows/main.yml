name: Android Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # এই স্টেপটা অটোমেটিক তোর লাইব্রেরি ডাউনলোডের লিঙ্ক ঠিক করে দেবে
      - name: Fix Missing Repositories
        run: |
          echo "allprojects { repositories { google(); mavenCentral(); jcenter(); maven { url 'https://jitpack.io' } } }" > init.gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug --init-script init.gradle --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: safeslotwin-apk
          path: app/build/outputs/apk/debug/app-debug.apk
